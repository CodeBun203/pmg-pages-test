<!DOCTYPE html>
<html lang="en">
<head>

<title>Thank You — PMG Mechanical</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;

       background:#f4f6f8;color:#1f2d3d}

  h1{font-size:1.6rem;margin:0 0 12px}
  p{font-size:1.05rem;line-height:1.5;color:#56606b;margin:0 0 28px}
  a{display:inline-block;background:#0b66c3;color:#fff;text-decoration:none;
    padding:12px 26px;border-radius:8px;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Thank you — we got your message!</h1>
    <p>A member of the PMG Mechanical team will be in touch with you shortly.</p>
    <a href="../">Return to Home</a>
  </div>
